name: CI-CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev lcov gcovr

    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build build

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Generate coverage report
      run: |
        cd build
        lcov --capture --directory . --output-file coverage.info --no-external --ignore-errors unused
        lcov --remove coverage.info '*/_deps/*' --output-file coverage.info --ignore-errors unused
        lcov --remove coverage.info '*/tests/*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./build/coverage.info
        flags: cpp-tests
        name: music-salon-coverage
        fail_ci_if_error: false

    - name: Done
      run: echo "Build and tests completed!"