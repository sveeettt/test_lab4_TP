name: CI-CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонируем код
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Устанавливаем зависимости
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev lcov gcovr

    # 3. Конфигурируем CMake в режиме Debug
    - name: Configure CMake
      run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug

    # 4. Собираем проект
    - name: Build
      run: cmake --build build

    # 5. Запускаем тесты
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure

    # 6. Генерируем отчёт о покрытии
    - name: Generate coverage report
      run: |
        cd build
        lcov --capture --directory . --output-file coverage.info --no-external
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        lcov --remove coverage.info '*/tests/*' --output-file coverage.info
        lcov --remove coverage.info '*/gtest/*' --output-file coverage.info
        lcov --list coverage.info

    # 7. Отправляем в Codecov
    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./build/coverage.info
        flags: cpp-tests
        name: music-salon-coverage
        fail_ci_if_error: false

    # 8. Сохраняем отчёт как артефакт
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: build/coverage_report/